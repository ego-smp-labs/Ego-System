# ==========================================
# Server Automation Configuration
# ==========================================

# ==================== LOCAL BACKUP ====================
# Backup server files to a local folder
local-backup:
  # Enable local backup
  enabled: true
  
  # Backup folder (relative to server root, or absolute path)
  backup-folder: "backups"
  
  # Maximum number of backups to keep (oldest will be deleted)
  max-backups: 10
  
  # Schedule using cron format
  # Examples:
  #   "0 */6 * * *" - Every 6 hours
  #   "0 0 * * *"   - Daily at midnight
  #   "0 0 * * 0"   - Weekly on Sunday
  schedule: "0 */6 * * *"
  
  # Backup on server shutdown
  on-shutdown: true
  
  # What to backup
  backup-worlds: true      # Backup world folders
  backup-plugins: true     # Backup plugin JARs
  backup-configs: true     # Backup config files (*.yml, *.json, *.properties)
  
  # Specific paths to include (in addition to above)
  include-paths:
    - "server.properties"
    - "bukkit.yml"
    - "spigot.yml"
    - "paper.yml"
    - "permissions.yml"
  
  # Paths to exclude (glob patterns)
  exclude-paths:
    - "backups/"
    - "cache/"
    - "logs/"
    - "*.log"
    - "*.tmp"
    
  # Compress backup to zip (recommended)
  compress: true

# ==================== GITHUB SYNC (Optional) ====================
# Push backups to GitHub for off-site storage
github:
  # Enable GitHub sync
  enabled: false
  
  # GitHub Personal Access Token (PAT)
  # Required scopes: repo
  # Generate at: https://github.com/settings/tokens
  token: ""
  
  # Repository in format: owner/repo
  repository: ""
  
  # Branch to push backups to
  branch: "main"
  
  # Sync local backups to GitHub
  sync-backups: true
  
  # Commit message template
  # Placeholders: %date%, %time%, %server%
  commit-message: "Backup: %date% %time%"

# ==================== AUTO-UPDATE PLUGINS ====================
auto-update:
  # Enable auto-update feature
  enabled: false
  
  # Check interval in seconds (default: 24 hours)
  check-interval: 86400
  
  # Notify admins when updates are available
  notify-admins: true
  
  # Auto-apply updates on next restart
  auto-apply: false
  
  # Plugins to monitor for updates
  # Format:
  #   PluginName:
  #     source: github|url
  #     repo: owner/repo (for github)
  #     url: direct-download-url (for url)
  #     auto-apply: true|false
  plugins: {}
  # Example:
  #   EgoSMP:
  #     source: github
  #     repo: NirussVn0/EgoSMP

# ==================== LOGGING ====================
logging:
  verbose: false
  log-to-file: true

name: Ego-System
version: '1.0.0'
main: vn.nirussv.egosystem.EgoSystemPlugin
api-version: '1.21'
prefix: Ego-System
authors: [NirussVn0]
description: Automated server backup, plugin auto-update, and event management
softdepend: [PlaceholderAPI]

commands:
  ssm:
    description: Ego-System management commands
    usage: /ssm <backup|update|reload> [args]
    aliases: [egosystem, es]

permissions:
  serverauto.admin:
    description: Full access to ServerAutomation commands
    default: op
  serverauto.backup:
    description: Access to backup commands
    default: op
  serverauto.update:
    description: Access to update commands
    default: op
  serverauto.event:
    description: Access to event commands
    default: op
